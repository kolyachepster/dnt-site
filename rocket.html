<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ракета · баланс сохраняется</title>
    <style>
        * {
            box-sizing: border-box;
            font-family: 'Segoe UI', system-ui, sans-serif;
        }
        body {
            background: linear-gradient(145deg, #0b1c2f 0%, #1a3b55 100%);
            min-height: 100vh;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 16px;
        }
        .game-container {
            max-width: 900px;
            width: 100%;
            background: #0a1a2b;
            border-radius: 60px 60px 30px 30px;
            box-shadow: 0 30px 30px rgba(0,0,0,0.7), inset 0 0 0 4px #3f6b9c, inset 0 0 20px #7ab7e0;
            padding: 30px 25px;
            border: 4px solid #5d8bb8;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: #ffecaa;
            text-shadow: 3px 3px 0 #1d4970;
            font-size: 2.5rem;
            font-weight: 800;
            letter-spacing: 4px;
            margin-top: -10px;
            padding: 0 15px;
        }
        .balance-box {
            background: #1c3e5e;
            border-radius: 60px;
            padding: 12px 30px;
            font-size: 1.8rem;
            border: 3px solid #ffc857;
            box-shadow: 0 0 15px #ffb347;
            color: #f9e281;
        }
        .rocket-panel {
            background: #07121f;
            border-radius: 200px;
            padding: 30px 20px 20px 20px;
            margin: 15px 0 25px 0;
            border: 3px solid #7da0c0;
            box-shadow: inset 0 -5px 20px #1c3f5e;
        }
        .display {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 20px;
        }
        .multiplier {
            background: #0c283d;
            border-radius: 70px;
            padding: 25px 45px;
            border: 5px solid #ffc857;
            box-shadow: 0 0 30px #f6b83e;
        }
        #multValue {
            font-size: 6rem;
            font-weight: 800;
            color: #ffd966;
            text-shadow: 0 0 20px #ffb347;
            line-height: 1;
        }
        .multiplier span {
            font-size: 2rem;
            color: #bd9a5a;
        }
        .rocket-icon {
            font-size: 5rem;
            filter: drop-shadow(0 10px 10px #2b506e);
            transition: transform 0.2s;
        }
        .status {
            background: #142e44;
            border-radius: 50px;
            padding: 10px 25px;
            color: #b3e4ff;
            font-weight: bold;
            font-size: 1.5rem;
            text-align: center;
            margin: 15px 0;
            border: 2px solid #ffb852;
        }
        .bet-area {
            background: #0e2233;
            border-radius: 60px;
            padding: 25px;
            margin: 20px 0;
            border: 2px solid #ffcf8a;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px 30px;
        }
        .input-group {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }
        .input-group label {
            color: #ffdcaa;
            font-weight: 600;
            font-size: 1.2rem;
        }
        .input-group input {
            background: #fbf3e0;
            border: 4px solid #3f6290;
            border-radius: 40px;
            padding: 14px 25px;
            font-size: 1.5rem;
            font-weight: bold;
            width: 200px;
            text-align: center;
            box-shadow: inset 0 2px 8px #1f3140;
        }
        .input-group input:focus {
            outline: none;
            border-color: #f6b83e;
        }
        button {
            background: #f5c542;
            border: none;
            border-radius: 60px;
            padding: 16px 40px;
            font-size: 1.7rem;
            font-weight: 800;
            color: #0d2c41;
            border-bottom: 6px solid #a07d2c;
            cursor: pointer;
            transition: 0.07s;
            box-shadow: 0 8px 0 #51441c;
            letter-spacing: 1px;
        }
        button:active {
            transform: translateY(6px);
            border-bottom-width: 2px;
            box-shadow: 0 2px 0 #51441c;
        }
        button:disabled {
            opacity: 0.5;
            transform: none;
            border-bottom-width: 6px;
            box-shadow: 0 8px 0 #51441c;
            pointer-events: none;
        }
        .history {
            background: #0f263a;
            border-radius: 40px;
            padding: 15px;
            margin-top: 25px;
            border: 2px solid #c7a15e;
        }
        .history h3 {
            color: #ffda8b;
            margin: 0 0 10px 20px;
        }
        .history-list {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            justify-content: center;
            max-height: 100px;
            overflow-y: auto;
            padding: 8px;
        }
        .history-item {
            background: #203f59;
            padding: 8px 20px;
            border-radius: 30px;
            font-weight: bold;
            color: #e8c37b;
            border: 2px solid #966f33;
        }
        .cashout-info {
            font-size: 1.5rem;
            color: #d4edff;
            text-align: center;
            margin-top: 10px;
        }
        .warning {
            color: #ffa07a;
            font-size: 1.2rem;
            background: #3d1e1e;
            padding: 5px 15px;
            border-radius: 40px;
            display: inline-block;
        }
        .reset-balance {
            background: #4d6b8f;
            border-bottom-color: #263b54;
            font-size: 1rem;
            padding: 8px 20px;
            margin-left: 20px;
            box-shadow: 0 4px 0 #1f3140;
        }
        .slot-machine {
            background: #32281b;
            border-radius: 80px 80px 40px 40px;
            padding: 30px 20px 35px;
            border: 5px solid #af8747;
            box-shadow: inset 0 -8px 0 #6c4e29, 0 12px 0 #112211;
            margin-bottom: 25px;
        }
        .spin-btn {
            background: #d42828;
            border: none;
            color: white;
            font-size: 1.8rem;
            font-weight: bold;
            padding: 15px 40px;
            border-radius: 50px;
            box-shadow: 0 9px 0 #631111, 0 10px 20px black;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 3px;
            border: 3px solid #ffac7b;
            transition: 0.07s;
        }
        footer {
            text-align: center;
            color: #7fa5c2;
            margin-top: 20px;
        }
    </style>
</head>
<body>
<div class="game-container">
    <div class="header">
        <span>🚀 ROCKET CASHOUT</span>
        <div class="balance-box">
            💰 <span id="balanceDisplay">1000</span>
            <button class="reset-balance" id="resetBalanceBtn" title="Сбросить баланс до 1000">↻</button>
        </div>
        <div class="slot-machine">
            <a href="index.html" class="spin-btn">
                Главная
            </a>
        </div>
    </div>

    <!-- Ракетная панель -->
    <div class="rocket-panel">
        <div class="display">
            <div class="rocket-icon" id="rocket">🚀</div>
            <div class="multiplier">
                <span>x</span><span id="multValue">1.00</span>
            </div>
        </div>
        <div class="status" id="statusText">⏳ Сделайте ставку и запустите ракету</div>
    </div>

    <!-- Ставки и управление -->
    <div class="bet-area">
        <div class="input-group">
            <label>💰 Ставка</label>
            <input type="number" id="betInput" min="1" value="100" step="1">
        </div>
        <div class="input-group">
            <label>🎯 Авто-кэшаут (x)</label>
            <input type="number" id="autoInput" min="1.01" max="100" value="2.0" step="0.1">
        </div>
    </div>

    <div style="display: flex; justify-content: center; gap: 20px; flex-wrap: wrap;">
        <button id="launchBtn">🚀 ЗАПУСК</button>
        <button id="cashoutBtn" disabled>💰 ЗАБРАТЬ (CASH OUT)</button>
    </div>

    <div class="cashout-info" id="cashoutMessage"></div>

    <!-- История последних полётов -->
    <div class="history">
        <h3>📜 История полётов (коэффициент падения)</h3>
        <div class="history-list" id="historyList">
            <div class="history-item">—</div>
        </div>
    </div>
    <footer>⚡ ракета летит ~1x в секунду · случайный крах между 1x и 100x · баланс сохраняется</footer>
</div>

<script>
    (function() {
        // ---------- Состояние игры ----------
        let currentMultiplier = 1.00;
        let gameActive = false;
        let crashPoint = 0;
        let gameInterval = null;
        let speedFactor = 0.016; // ~1x в секунду
        
        // Ставка и баланс
        let currentBet = 0;
        let autoCashout = 2.0;
        let hasCashedOut = false;
        
        // Баланс (сохраняем в localStorage)
        let balance = 1000;
        const BALANCE_KEY = 'rocket_balance';
        
        // История
        let history = [];
        const HISTORY_KEY = 'rocket_history';
        
        // DOM элементы
        const multSpan = document.getElementById('multValue');
        const rocketIcon = document.getElementById('rocket');
        const statusText = document.getElementById('statusText');
        const launchBtn = document.getElementById('launchBtn');
        const cashoutBtn = document.getElementById('cashoutBtn');
        const betInput = document.getElementById('betInput');
        const autoInput = document.getElementById('autoInput');
        const cashoutMessage = document.getElementById('cashoutMessage');
        const historyList = document.getElementById('historyList');
        const balanceDisplay = document.getElementById('balanceDisplay');
        const resetBalanceBtn = document.getElementById('resetBalanceBtn');

        // ---------- Загрузка и сохранение баланса ----------
        function loadBalance() {
            const saved = localStorage.getItem(BALANCE_KEY);
            if (saved !== null) {
                balance = parseFloat(saved);
                if (isNaN(balance) || balance < 0) balance = 1000;
            } else {
                balance = 1000;
            }
            updateBalanceDisplay();
        }
        
        function saveBalance() {
            localStorage.setItem(BALANCE_KEY, balance.toString());
            updateBalanceDisplay();
        }
        
        function updateBalanceDisplay() {
            balanceDisplay.innerText = balance.toFixed(2);
        }
        
        // Сброс баланса до 1000
        function resetBalance() {
            if (gameActive) return; // нельзя сбрасывать во время игры
            balance = 1000;
            saveBalance();
            cashoutMessage.innerText = '✨ Баланс сброшен до 1000';
        }

        // ---------- Загрузка истории ----------
        function loadHistory() {
            const saved = localStorage.getItem(HISTORY_KEY);
            if (saved) {
                try {
                    history = JSON.parse(saved);
                    if (!Array.isArray(history)) history = [];
                } catch {
                    history = [];
                }
            }
            updateHistory();
        }
        
        function saveHistory() {
            localStorage.setItem(HISTORY_KEY, JSON.stringify(history));
        }

        // ---------- Генерация точки краха ----------
        function generateCrashPoint() {
            const r = Math.random();
            const crash = 1 + (r * r) * 99;
            return Math.round(crash * 100) / 100;
        }

        // ---------- Запуск нового полёта ----------
        function launchRocket() {
            if (gameActive) return;
            
            // Получаем значения ставки
            let bet = parseFloat(betInput.value);
            if (isNaN(bet) || bet < 1) bet = 100;
            
            // Проверка на достаточность баланса
            if (bet > balance) {
                cashoutMessage.innerText = '❌ Недостаточно средств!';
                return;
            }
            
            // Списываем ставку с баланса
            balance -= bet;
            saveBalance();
            
            betInput.value = bet;
            
            let auto = parseFloat(autoInput.value);
            if (isNaN(auto) || auto < 1.01) auto = 2.0;
            if (auto > 100) auto = 100;
            autoInput.value = auto.toFixed(1);
            
            currentBet = bet;
            autoCashout = auto;
            hasCashedOut = false;
            
            // Сброс мультипликатора
            currentMultiplier = 1.00;
            multSpan.innerText = currentMultiplier.toFixed(2);
            
            // Генерируем точку краха
            crashPoint = generateCrashPoint();
            
            gameActive = true;
            launchBtn.disabled = true;
            cashoutBtn.disabled = false;
            betInput.disabled = true;
            autoInput.disabled = true;
            resetBalanceBtn.disabled = true;
            
            statusText.innerText = '🚀 РАКЕТА ВЗЛЕТЕЛА!';
            cashoutMessage.innerText = `Ставка ${currentBet} · авто-кэшаут ${autoCashout}x · баланс ${balance.toFixed(2)}`;
            
            if (gameInterval) clearInterval(gameInterval);
            gameInterval = setInterval(() => {
                if (!gameActive) return;
                
                currentMultiplier += speedFactor;
                let displayMult = Math.floor(currentMultiplier * 100) / 100;
                multSpan.innerText = displayMult.toFixed(2);
                
                rocketIcon.style.transform = `translate(${Math.sin(Date.now()*0.02)*3}px, ${-Math.sin(Date.now()*0.03)*2}px)`;
                
                // Авто-кэшаут
                if (!hasCashedOut && displayMult >= autoCashout) {
                    cashOut('auto');
                }
                
                // Крах
                if (displayMult >= crashPoint) {
                    crashRocket();
                }
            }, 16);
        }

        // ---------- Крах ракеты ----------
        function crashRocket() {
            if (!gameActive) return;
            
            gameActive = false;
            clearInterval(gameInterval);
            gameInterval = null;
            
            let crashMult = Math.floor(crashPoint * 100) / 100;
            multSpan.innerText = crashMult.toFixed(2);
            
            // Если игрок не успел вывести — проигрыш (баланс уже уменьшен)
            if (!hasCashedOut) {
                cashoutMessage.innerText = `💥 Ракета упала на x${crashMult.toFixed(2)} · Вы проиграли ${currentBet} · баланс ${balance.toFixed(2)}`;
                statusText.innerText = '💥 ВЗРЫВ! Вы не успели...';
                // Баланс уже списан, ничего не добавляем
            } else {
                statusText.innerText = '🛸 Ракета упала, но вы в безопасности';
            }
            
            // Сохраняем в историю
            history.unshift(crashMult);
            if (history.length > 10) history.pop();
            saveHistory();
            updateHistory();
            
            finishRound();
        }

        // ---------- Кэшаут ----------
        function cashOut(type = 'manual') {
            if (!gameActive || hasCashedOut) return;
            
            hasCashedOut = true;
            
            let cashMult = Math.floor(currentMultiplier * 100) / 100;
            let winAmount = currentBet * cashMult;
            
            // Добавляем выигрыш на баланс (ставка уже списана, поэтому добавляем чистый выигрыш + возвращаем ставку)
            // Проще: добавляем полную сумму выигрыша, но помним что ставка списана => net = winAmount
            balance += winAmount;
            saveBalance();
            
            if (type === 'auto') {
                cashoutMessage.innerText = `🤖 Авто-кэшаут на x${cashMult.toFixed(2)} · Выигрыш: ${winAmount.toFixed(2)} · баланс ${balance.toFixed(2)}`;
                statusText.innerText = '✅ Автоматический вывод!';
            } else {
                cashoutMessage.innerText = `💰 Вы забрали на x${cashMult.toFixed(2)} · Выигрыш: ${winAmount.toFixed(2)} · баланс ${balance.toFixed(2)}`;
                statusText.innerText = '💰 Кэшаут успешен!';
            }
        }

        // ---------- Завершение раунда ----------
        function finishRound() {
            launchBtn.disabled = false;
            cashoutBtn.disabled = true;
            betInput.disabled = false;
            autoInput.disabled = false;
            resetBalanceBtn.disabled = false;
            rocketIcon.style.transform = 'translate(0,0)';
        }

        // ---------- Обновление истории ----------
        function updateHistory() {
            let html = '';
            if (history.length === 0) {
                html = '<div class="history-item">—</div>';
            } else {
                history.forEach((point) => {
                    let color = point < 2 ? '#a3d0ff' : (point < 5 ? '#ffdb8f' : '#ffa07a');
                    html += `<div class="history-item" style="background: #1f4460; color: ${color};">x${point.toFixed(2)}</div>`;
                });
            }
            historyList.innerHTML = html;
        }

        // ---------- Обработчики ----------
        launchBtn.addEventListener('click', launchRocket);
        cashoutBtn.addEventListener('click', () => {
            if (gameActive && !hasCashedOut) cashOut('manual');
        });
        
        resetBalanceBtn.addEventListener('click', () => {
            if (!gameActive) {
                resetBalance();
            }
        });

        betInput.addEventListener('change', function() {
            let v = parseFloat(this.value);
            if (isNaN(v) || v < 1) this.value = 100;
            if (v > balance) this.value = balance; // нельзя поставить больше чем есть
        });
        
        autoInput.addEventListener('change', function() {
            let v = parseFloat(this.value);
            if (isNaN(v) || v < 1.01) this.value = 2.0;
            if (v > 100) this.value = 100;
            this.value = parseFloat(this.value).toFixed(1);
        });

        // ---------- Инициализация ----------
        loadBalance();
        loadHistory();
        statusText.innerText = '⏳ Сделайте ставку и запустите ракету';
        
        // Проверка ставки при загрузке
        if (betInput.value > balance) betInput.value = balance;
    })();
</script>
</body>
</html>
