<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Фейк-казино | Слоты + Кликер</title>
    <style>
        * {
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
            user-select: none;
        }
        body {
            background: linear-gradient(145deg, #1a2f1f 0%, #0e1a12 100%);
            min-height: 100vh;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .game-container {
            max-width: 700px;
            width: 100%;
            background: #1e3b2a;
            background-image: radial-gradient(circle at 30% 20%, #2f6b4a, #153b24);
            border-radius: 48px;
            padding: 28px 24px;
            box-shadow: 0 25px 40px rgba(0,0,0,0.7), inset 2px 2px 8px rgba(255,215,150,0.4), inset -4px -4px 12px #0f281b;
            border: 2px solid #c9a35e;
        }

        /* БАЛАНС */
        .balance-panel {
            background: #241f16;
            border-radius: 60px;
            padding: 16px 24px;
            margin-bottom: 25px;
            border: 3px solid #b58b4b;
            box-shadow: inset 0 -3px 0 #6b4f2a, 0 8px 0 #0f2b1b;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: #ffddaa;
            text-shadow: 2px 2px 0 #5f3f1a;
            font-weight: bold;
            font-size: 1.8rem;
        }
        .balance-label {
            font-size: 1.2rem;
            background: #4d3e28;
            padding: 8px 22px;
            border-radius: 40px;
            border: 2px solid #efc47a;
            box-shadow: inset 0 -2px 0 #2f2317;
        }
        .balance-value {
            font-family: 'Courier New', monospace;
            background: #0f1d14;
            padding: 8px 25px;
            border-radius: 40px;
            border: 3px solid #e3b15f;
            letter-spacing: 2px;
            color: #fae37c;
            text-shadow: 0 0 8px #ffb347;
        }

        /* СЛОТ МАШИНА */
        .slot-machine {
            background: #32281b;
            border-radius: 80px 80px 40px 40px;
            padding: 30px 20px 35px;
            border: 5px solid #af8747;
            box-shadow: inset 0 -8px 0 #6c4e29, 0 12px 0 #112211;
            margin-bottom: 25px;
        }
        .reels {
            display: flex;
            gap: 18px;
            justify-content: center;
            margin-bottom: 25px;
        }
        .reel {
            width: 110px;
            height: 140px;
            background: #f2e5c0;
            background: linear-gradient(145deg, #fff2ce, #ecdba8);
            border: 5px solid #b38741;
            border-radius: 30px;
            box-shadow: inset 0 -8px 0 #aa884a, 0 12px 0 #382b17;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 5.2rem;
            transform: rotate(0deg);
            transition: all 0.1s ease;
            color: #2f2f1d;
            text-shadow: 4px 4px 0 rgba(150,80,0,0.5);
        }
        .reel.spinning {
            animation: spinBlur 0.2s infinite linear;
            filter: blur(1px);
            transform: scale(1.02);
            background: #dac48b;
        }
        @keyframes spinBlur {
            0% { transform: rotate(3deg) scale(1.02); }
            50% { transform: rotate(-5deg) scale(1.05); background: #eedbaa; }
        }

        /* СТАВКИ */
        .bet-panel {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            background: #271f15;
            padding: 18px 20px;
            border-radius: 60px;
            border: 2px solid #b89b5e;
            margin-top: 10px;
        }
        .bet-btn {
            background: #4d3822;
            border: none;
            color: #ffd89c;
            font-size: 2rem;
            font-weight: bold;
            width: 55px;
            height: 55px;
            border-radius: 30px;
            box-shadow: 0 7px 0 #271d12, 0 8px 8px black;
            cursor: pointer;
            transition: 0.07s;
            border: 2px solid #dbb165;
        }
        .bet-btn:active {
            transform: translateY(6px);
            box-shadow: 0 2px 0 #271d12;
        }
        .bet-display {
            font-size: 2.2rem;
            background: #1e2a1b;
            padding: 10px 35px;
            border-radius: 40px;
            border: 3px solid #f5c271;
            color: #ffcf8a;
            font-weight: 800;
            min-width: 130px;
            text-align: center;
        }
        .spin-btn {
            background: #d42828;
            border: none;
            color: white;
            font-size: 1.8rem;
            font-weight: bold;
            padding: 15px 40px;
            border-radius: 50px;
            box-shadow: 0 9px 0 #631111, 0 10px 20px black;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 3px;
            border: 3px solid #ffac7b;
            transition: 0.07s;
        }
        .spin-btn:active {
            transform: translateY(7px);
            box-shadow: 0 3px 0 #631111;
        }
        .spin-btn:disabled {
            opacity: 0.4;
            transform: translateY(5px);
            box-shadow: 0 5px 0 #631111;
            pointer-events: none;
        }

        /* КЛИКЕР */
        .clicker-area {
            background: #2f4d33;
            border-radius: 60px 60px 30px 30px;
            padding: 20px 20px 30px;
            border: 3px solid #ecc47c;
            box-shadow: inset 0 -5px 0 #25663d, 0 10px 0 #1b381f;
        }
        .click-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            color: #fef7b6;
            text-shadow: 2px 2px 0 #5d6b2b;
            font-weight: bold;
            font-size: 1.3rem;
            margin-bottom: 10px;
        }
        .click-stats {
            background: #1f3b23;
            padding: 12px 20px;
            border-radius: 50px;
            border: 2px solid #f3cf91;
            display: flex;
            gap: 30px;
        }
        .click-power {
            background: #232b12;
            padding: 8px 20px;
            border-radius: 30px;
            border: 2px solid gold;
            font-size: 1.5rem;
        }
        .click-main-btn {
            background: #ffcc66;
            background: radial-gradient(circle at 30% 20%, #ffe792, #dba53f);
            border: 6px solid #fff1b5;
            color: #2b421f;
            font-size: 3.5rem;
            font-weight: 800;
            padding: 30px 0;
            width: 100%;
            border-radius: 90px;
            box-shadow: 0 15px 0 #9e7628, 0 20px 15px black;
            cursor: pointer;
            transition: 0.1s;
            margin: 10px 0;
            text-transform: uppercase;
        }
        .click-main-btn:active {
            transform: translateY(12px);
            box-shadow: 0 5px 0 #9e7628, 0 12px 15px black;
        }
        .upgrade-section {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: #1a2e18;
            border-radius: 90px;
            padding: 10px 20px;
            border: 2px solid #fcd693;
            margin-top: 15px;
        }
        .upgrade-btn {
            background: #47341c;
            border: none;
            color: #ffcf8a;
            font-size: 1.9rem;
            font-weight: bold;
            padding: 8px 30px;
            border-radius: 40px;
            border: 3px solid #ffbc5c;
            box-shadow: 0 7px 0 #2b1d0e;
            cursor: pointer;
            transition: 0.07s;
        }
        .upgrade-btn:active {
            transform: translateY(6px);
            box-shadow: 0 2px 0 #2b1d0e;
        }
        .result-message {
            text-align: center;
            background: #0f0f0faa;
            margin: 15px 0 5px;
            padding: 14px;
            border-radius: 40px;
            font-size: 1.5rem;
            font-weight: bold;
            color: #ffdba4;
            border: 2px solid #b59054;
            backdrop-filter: blur(4px);
        }
    </style>
</head>
<body>
    <div class="game-container">
        <!-- БАЛАНС -->
        <div class="balance-panel">
            <span class="balance-label">💰 ФИШКИ</span>
            <span class="balance-value" id="balanceDisplay">1000</span>
        </div>

        <!-- СЛОТЫ -->
        <div class="slot-machine">
            <div class="reels">
                <div class="reel" id="reel1">🍒</div>
                <div class="reel" id="reel2">🍒</div>
                <div class="reel" id="reel3">🍒</div>
            </div>

            <!-- СТАВКИ И КРУТКА -->
            <div class="bet-panel">
                <button class="bet-btn" id="betDown">−</button>
                <span class="bet-display" id="betAmount">10</span>
                <button class="bet-btn" id="betUp">+</button>
                <button class="spin-btn" id="spinButton">▶ КРУТИТЬ</button>
            </div>
        </div>

        <!-- КЛИКЕР И УЛУЧШЕНИЯ -->
        <div class="clicker-area">
            <div class="click-header">
                <span>⚡ КЛИКЕР ⚡</span>
                <div class="click-stats">
                    <span>💰 за клик: <span id="clickPower">1</span></span>
                </div>
            </div>

            <button class="click-main-btn" id="clickButton">👆 ТЫК 👆</button>

            <div class="upgrade-section">
                <span style="color: #fad377;">🚀 Улучшение клика</span>
                <button class="upgrade-btn" id="upgradeClickBtn">✚ за <span id="upgradeCost">50</span></button>
            </div>
            <div class="result-message" id="slotResult">🔄 Крути и выигрывай!</div>
        </div>
    </div>

    <script>
        (function() {
            // ---------- СОСТОЯНИЕ ----------
            let balance = 1000;                // фейковый баланс
            let bet = 10;                       // текущая ставка
            const minBet = 5;
            const maxBet = 500;

            // Символы для слотов (эмодзи)
            const symbols = ['🍒', '🍋', '🍊', '7️⃣', '💎', '🔔'];
            // выплаты: индекс символа -> множитель (ставка * множитель)
            const payouts = [2, 3, 4, 10, 15, 7];  // для 🍒,🍋,🍊,7️⃣,💎,🔔

            let reel1El = document.getElementById('reel1');
            let reel2El = document.getElementById('reel2');
            let reel3El = document.getElementById('reel3');
            let balanceEl = document.getElementById('balanceDisplay');
            let betEl = document.getElementById('betAmount');
            let spinBtn = document.getElementById('spinButton');
            let slotResult = document.getElementById('slotResult');

            // Кликер
            let clickPower = 1;                  // валюты за клик
            let upgradeBaseCost = 50;            // базовая стоимость улучшения
            let upgradeCost = 50;
            const clickPowerEl = document.getElementById('clickPower');
            const upgradeCostEl = document.getElementById('upgradeCost');
            const clickBtn = document.getElementById('clickButton');
            const upgradeBtn = document.getElementById('upgradeClickBtn');

            // Флаг прокрутки (блокировка спама)
            let isSpinning = false;

            // ---------- ОБНОВЛЕНИЕ ИНТЕРФЕЙСА ----------
            function updateUI() {
                balanceEl.innerText = balance;
                betEl.innerText = bet;
                clickPowerEl.innerText = clickPower;
                upgradeCostEl.innerText = upgradeCost;
            }

            // Рандомный символ
            function randomSymbol() {
                return symbols[Math.floor(Math.random() * symbols.length)];
            }

            // Проверка выигрыша и расчет прибавки
            function calculateWin(s1, s2, s3) {
                // все три одинаковых
                if (s1 === s2 && s2 === s3) {
                    const idx = symbols.indexOf(s1);
                    if (idx !== -1) {
                        return bet * payouts[idx];
                    }
                }
                // если два одинаковых (любые два) — маленький выигрыш (2х ставки)
                if (s1 === s2 || s1 === s3 || s2 === s3) {
                    return bet * 2;  // consolation
                }
                return 0; // проигрыш
            }

            // Функция вращения (анимация + результат)
            function spin() {
                if (isSpinning) return;
                if (balance < bet) {
                    slotResult.innerText = '❌ Недостаточно фишек! Кликай!';
                    return;
                }

                // списываем ставку
                balance -= bet;
                updateUI();

                // Блокировка кнопки и анимация
                isSpinning = true;
                spinBtn.disabled = true;

                // Добавляем класс анимации на релы
                reel1El.classList.add('spinning');
                reel2El.classList.add('spinning');
                reel3El.classList.add('spinning');

                // Быстрая смена символов (имитация прокрутки)
                let spinCount = 0;
                const maxSpins = 10;  // кол-во смен перед остановкой
                const interval = setInterval(() => {
                    reel1El.innerText = randomSymbol();
                    reel2El.innerText = randomSymbol();
                    reel3El.innerText = randomSymbol();
                    spinCount++;

                    if (spinCount >= maxSpins) {
                        clearInterval(interval);

                        // ФИНАЛЬНЫЕ СЛУЧАЙНЫЕ ЗНАЧЕНИЯ
                        const final1 = randomSymbol();
                        const final2 = randomSymbol();
                        const final3 = randomSymbol();

                        reel1El.innerText = final1;
                        reel2El.innerText = final2;
                        reel3El.innerText = final3;

                        // Убираем анимацию
                        reel1El.classList.remove('spinning');
                        reel2El.classList.remove('spinning');
                        reel3El.classList.remove('spinning');

                        // Расчёт выигрыша
                        const winAmount = calculateWin(final1, final2, final3);
                        if (winAmount > 0) {
                            balance += winAmount;
                            slotResult.innerText = `🎉 ВЫИГРЫШ: +${winAmount} фишек! 🎉`;
                        } else {
                            slotResult.innerText = '😓 Проигрыш... Попробуй ещё!';
                        }

                        updateUI();
                        isSpinning = false;
                        spinBtn.disabled = false;
                    }
                }, 80);
            }

            // ---------- НАСТРОЙКА СТАВОК ----------
            document.getElementById('betUp').addEventListener('click', () => {
                if (isSpinning) return;
                let newBet = bet + 5;
                if (newBet <= maxBet) {
                    bet = newBet;
                } else {
                    bet = maxBet;
                }
                updateUI();
            });

            document.getElementById('betDown').addEventListener('click', () => {
                if (isSpinning) return;
                let newBet = bet - 5;
                if (newBet >= minBet) {
                    bet = newBet;
                } else {
                    bet = minBet;
                }
                updateUI();
            });

            // Кнопка вращения
            spinBtn.addEventListener('click', spin);

            // ---------- КЛИКЕР ----------
            clickBtn.addEventListener('click', () => {
                if (isSpinning) return; // не мешаем крутке
                balance += clickPower;
                slotResult.innerText = `👆 +${clickPower} фишек за клик!`;
                updateUI();
            });

            // Улучшение клика
            function upgradeClick() {
                if (balance >= upgradeCost) {
                    balance -= upgradeCost;
                    clickPower++;   // увеличиваем валюту за клик на 1

                    // повышаем стоимость следующего улучшения (хитрая формула)
                    upgradeCost = Math.floor(upgradeCost * 1.6); 
                    if (upgradeCost > 5000) upgradeCost = 5000; // потолок

                    slotResult.innerText = `⚡ Урон клика теперь ${clickPower}! След. апгрейд = ${upgradeCost}`;
                    updateUI();
                } else {
                    slotResult.innerText = '💰 Не хватает фишек на улучшение!';
                }
            }

            upgradeBtn.addEventListener('click', upgradeClick);

            // Инициализация интерфейса
            updateUI();

            // доп. маленькая фича: изменение цвета баланса при недостатке (просто косметика)
        })();
    </script>
</body>
</html>
